<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <a href="next.html">Home</a>
  <a href="categories.html">Categories</a>
  <a href="women.html">Women</a>
  <a href="men.html">Men</a>
  <a href="kids.html">Kids</a>
  <a href="cart.html">Cart</a>
  <a href="ai.html">AI Stylist</a>
</div>

<!-- CART -->
<div class="cart-fixed" onclick="window.location.href='cart.html'">
  🛒 <span class="cart-count" id="cartCount">0</span>
</div>

<!-- NAVBAR -->
<header class="fashion-navbar">
  <div class="nav-left">+ contact us</div>
  <div class="nav-center">Fashion Hub</div>
  <div class="nav-right">
    <span class="search-icon">&#9906;</span>
    <span class="menu-icon" onclick="openSidebar()">&#9776;</span>
  </div>
</header>

<h1 class="page-title">Your Cart</h1>

<div id="cartContainer" class="cart-container"></div>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const cartContainer = document.getElementById("cartContainer");

  function updateCartCount() {
    const countElement = document.getElementById("cartCount");
    if (countElement) {
      countElement.textContent = cart.length;
    }
  }

  function renderCart() {
    cartContainer.innerHTML = "";

    if (cart.length === 0) {
      cartContainer.innerHTML = "<p class='empty-cart'>Your cart is empty</p>";
      updateCartCount();
      return;
    }

    let total = 0;

    cart.forEach((item, index) => {
      total += item.price;

      cartContainer.innerHTML += `
        <div class="cart-card">
          <img src="${item.image}" class="cart-image" />
          <div class="cart-info">
            <h3>${item.name}</h3>
            <p>Price: Rs. ${item.price}</p>
            <p>Size: ${item.size}</p>
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
          </div>
        </div>
      `;
    });

    cartContainer.innerHTML += `
      <div class="cart-total">
        <h2>Total: Rs. ${total}</h2>
        <button class="buy-btn" onclick="goToPayment()">BUY NOW</button>
      </div>
    `;

    updateCartCount();
  }

  function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  function goToPayment() {
    if (cart.length === 0) {
      alert("Your cart is empty");
      return;
    }
    window.location.href = "payment.html";
  }

  function openSidebar() {
    document.getElementById("sidebar").style.right = "0";
  }

  function closeSidebar() {
    document.getElementById("sidebar").style.right = "-260px";
  }

  renderCart();
</script>

</body>
</html>
