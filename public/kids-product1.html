<!DOCTYPE html>
<html>
<head>
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <a href="next.html">Home</a>
  <a href="categories.html">Categories</a>
  <a href="women.html">Women</a>
  <a href="men.html">Men</a>
  <a href="kids.html">Kids</a>
  <a href="cart.html">Cart</a>
  <a href="ai.html">AI Stylist</a>
</div>

<!-- CART -->
<div class="cart-fixed" onclick="window.location.href='cart.html'">
  🛒 <span class="cart-count" id="cartCount">0</span>
</div>

<!-- NAVBAR -->
<header class="fashion-navbar">
  <div class="nav-left">+ contact us</div>
  <div class="nav-center">Fashion Hub</div>
  <div class="nav-right">
    <span class="search-icon">&#9906;</span>
    <span class="menu-icon" onclick="openSidebar()">&#9776;</span>
  </div>
</header>

<h1 class="page-title">Product Details</h1>

<div class="product-detail-box">

<img src="https://i.pinimg.com/474x/14/c0/ff/14c0ff2a25e6fe396533dbfcfebc88a9.jpg"
style="width:100%; height:350px; object-fit:cover; border-radius:10px;" />

<h2>Kids Casual Wear</h2>
<p class="detail-price">Rs. 999</p>

<select id="size" class="detail-select">
<option value="">Select Size</option>
<option>2-3 yrs</option>
<option>4-5 yrs</option>
<option>6-7 yrs</option>
<option>8-9 yrs</option>
</select>

<button class="detail-btn">VIEW SIZE GUIDE</button>
<button class="detail-btn" onclick="addToCart()">ADD TO CART</button>
<button class="detail-btn">FIND IN STORE</button>

</div>

<script>
// CART COUNT
const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
document.getElementById("cartCount").textContent = cartItems.length;

// SIDEBAR
function openSidebar() {
  document.getElementById("sidebar").style.right = "0";
}
function closeSidebar() {
  document.getElementById("sidebar").style.right = "-260px";
}

// ADD TO CART
function addToCart() {
  const size = document.getElementById("size").value;
  if (size === "") { alert("Select size"); return; }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: "Kids Casual Wear",
    price: 999,
    size: size,
    image: "https://i.pinimg.com/474x/14/c0/ff/14c0ff2a25e6fe396533dbfcfebc88a9.jpg"
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}
</script>

</body>
</html>
