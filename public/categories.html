<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Hub - Categories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <a href="next.html">Home</a>
  <a href="categories.html">Categories</a>
  <a href="women.html">Women</a>
  <a href="men.html">Men</a>
  <a href="kids.html">Kids</a>
  <a href="cart.html">Cart</a>
  <a href="ai.html">AI Stylist</a>
</div>

<div class="cart-fixed" onclick="window.location.href='cart.html'">🛒</div>

<div class="categories-page">
  <header class="fashion-navbar">
    <div class="nav-left">+ contact us</div>
    <div class="nav-center">Fashion Hub</div>
    <div class="nav-right">
      <span class="search-icon">&#9906;</span>
      <span class="menu-icon" onclick="openSidebar()">&#9776;</span>
    </div>
  </header>

  <section class="categories-heading-box">
    <h1>Shop By Category</h1>
    <p>Select your style section</p>
  </section>

  <section class="categories-grid">

    <div class="category-card" onclick="window.location.href='women.html'">
      <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=80" alt="Women Fashion">
      <div class="category-overlay">
        <h2>Women</h2>
      </div>
    </div>

    <div class="category-card" onclick="window.location.href='men.html'">
      <img src="https://cdn.shopify.com/s/files/1/0759/1005/4204/files/jakt-denimball-lblue_46136317-13f5-4a48-b128-4893e6bc9b90.jpg?v=1758334769&w=165" alt="Men Fashion">
      <div class="category-overlay">
        <h2>Men</h2>
      </div>
    </div>

    <div class="category-card" onclick="window.location.href='kids.html'">
      <img src="https://media.istockphoto.com/id/155099131/photo/shopping.jpg?s=612x612&w=0&k=20&c=3ZL_FI-1cUKnBh3Lo6mVnX9qy-Ond4QTmRdKu11EtHg=" alt="Kids Fashion">
      <div class="category-overlay">
        <h2>Kids</h2>
      </div>
    </div>

  </section>
</div>

<script>
function openSidebar() {
  document.getElementById("sidebar").style.right = "0";
}

function closeSidebar() {
  document.getElementById("sidebar").style.right = "-260px";
}
</script>

</body>
</html>
