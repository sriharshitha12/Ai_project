<!DOCTYPE html>
<html>
<head>
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <a href="next.html">Home</a>
  <a href="categories.html">Categories</a>
  <a href="women.html">Women</a>
  <a href="men.html">Men</a>
  <a href="kids.html">Kids</a>
  <a href="cart.html">Cart</a>
  <a href="ai.html">AI Stylist</a>
</div>

<div class="cart-fixed" onclick="window.location.href='cart.html'">
  🛒 <span class="cart-count" id="cartCount">0</span>
</div>

<header class="fashion-navbar">
  <div class="nav-left">+ contact us</div>
  <div class="nav-center">Fashion Hub</div>
  <div class="nav-right">
    <span class="search-icon">&#9906;</span>
    <span class="menu-icon" onclick="openSidebar()">&#9776;</span>
  </div>
</header>

<h1 class="page-title">Product Details</h1>

<div class="product-detail-box">

  <img
    src="https://media.istockphoto.com/id/1136518847/photo/attractive-woman-in-summer-dress-on-ocean-beach-at-sunset.jpg?s=612x612&w=0&k=20&c=J32xIYopEt6oMJOxd5RtKQ8mlN-3z0_ISqBFFA5Rde4="
    style="width:100%; height:350px; object-fit:cover; border-radius:10px;"
  />

  <h2>Summer Wear</h2>
  <p class="detail-price">Rs. 2,199</p>

  <select id="size" class="detail-select">
    <option value="">Select Size</option>
    <option>S</option>
    <option>M</option>
    <option>L</option>
    <option>XL</option>
  </select>

  <button class="detail-btn">VIEW SIZE GUIDE</button>
  <button class="detail-btn" onclick="addToCart()">ADD TO CART</button>
  <button class="detail-btn">FIND IN STORE</button>

</div>

<script>
  const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
  const cartCount = document.getElementById("cartCount");
  if (cartCount) {
    cartCount.textContent = cartItems.length;
  }

  function openSidebar() {
    document.getElementById("sidebar").style.right = "0";
  }

  function closeSidebar() {
    document.getElementById("sidebar").style.right = "-260px";
  }

  function addToCart() {
    const size = document.getElementById("size").value;

    if (size === "") {
      alert("Please select a size");
      return;
    }

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const product = {
      name: "Summer Wear",
      price: 2199,
      size: size,
      image: "https://media.istockphoto.com/id/1136518847/photo/attractive-woman-in-summer-dress-on-ocean-beach-at-sunset.jpg?s=612x612&w=0&k=20&c=J32xIYopEt6oMJOxd5RtKQ8mlN-3z0_ISqBFFA5Rde4="
    };

    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Added to cart");
  }
</script>

</body>
</html>
