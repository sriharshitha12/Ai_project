<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Hub - AI Stylist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <a href="next.html">Home</a>
  <a href="categories.html">Categories</a>
  <a href="women.html">Women</a>
  <a href="men.html">Men</a>
  <a href="kids.html">Kids</a>
  <a href="cart.html">Cart</a>
  <a href="ai.html">AI Stylist</a>
</div>

<!-- CART -->
<div class="cart-fixed" onclick="window.location.href='cart.html'">
  🛒 <span class="cart-count" id="cartCount">0</span>
</div>

<!-- NAVBAR -->
<header class="fashion-navbar">
  <div class="nav-left">+ contact us</div>
  <div class="nav-center">Fashion Hub</div>
  <div class="nav-right">
    <span class="search-icon">&#9906;</span>
    <span class="menu-icon" onclick="openSidebar()">&#9776;</span>
  </div>
</header>

<h1 class="page-title">🤖 AI Stylist</h1>

<div class="ai-box">
  <h2>Not sure what to wear?</h2>

  <select id="occasion">
    <option value="">Select Occasion</option>
    <option value="party">Party</option>
    <option value="casual">Casual</option>
    <option value="office">Office</option>
  </select>

  <select id="gender">
    <option value="">Select Category</option>
    <option value="women">Women</option>
    <option value="men">Men</option>
    <option value="kids">Kids</option>
  </select>

  <button onclick="recommendOutfit()">Suggest Outfit</button>

  <p id="result"></p>
</div>

<script>
  // CART COUNT
  const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
  const cartCount = document.getElementById("cartCount");
  if (cartCount) {
    cartCount.textContent = cartItems.length;
  }

  // SIDEBAR
  function openSidebar() {
    document.getElementById("sidebar").style.right = "0";
  }

  function closeSidebar() {
    document.getElementById("sidebar").style.right = "-260px";
  }

  // AI OUTFIT RECOMMENDATION
  function recommendOutfit() {
    const occasion = document.getElementById("occasion").value;
    const gender = document.getElementById("gender").value;
    const result = document.getElementById("result");

    if (!occasion || !gender) {
      result.innerText = "Please select both options";
      return;
    }

    if (gender === "women") {
      if (occasion === "party") {
        window.location.href = "women-product2.html";
      } else if (occasion === "casual") {
        window.location.href = "women-product1.html";
      } else {
        window.location.href = "women-product3.html";
      }
    }

    if (gender === "men") {
      if (occasion === "party") {
        window.location.href = "men-product3.html";
      } else if (occasion === "casual") {
        window.location.href = "men-product1.html";
      } else {
        window.location.href = "men-product4.html";
      }
    }

    if (gender === "kids") {
      if (occasion === "party") {
        window.location.href = "kids-product2.html";
      } else if (occasion === "casual") {
        window.location.href = "kids-product1.html";
      } else {
        window.location.href = "kids-product3.html";
      }
    }
  }
</script>

</body>
</html>
